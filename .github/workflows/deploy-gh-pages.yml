# Publishes the static Next.js export from apps/web to GitHub Pages (not the repo README).
# Repo settings: Settings → Pages → Build and deployment → Source: GitHub Actions.

name: Deploy GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace @email-saas/shared

      - name: Build web (static export)
        run: npm run build --workspace @email-saas/web
        env:
          NEXT_STATIC_EXPORT: '1'
          # Optional repo Variables (Settings → Secrets and variables → Actions → Variables):
          # NEXT_PUBLIC_BASE_PATH=/my-repo   (project site; leading slash, no trailing slash)
          # NEXT_PUBLIC_WEB_URL=https://<owner>.github.io/my-repo
          # NEXT_PUBLIC_API_URL=https://your-api.example.com
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH }}
          NEXT_PUBLIC_WEB_URL: ${{ vars.NEXT_PUBLIC_WEB_URL }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
